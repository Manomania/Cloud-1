---
- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - rsync
    state: present

- name: Allow root SSH login with public key only
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-cloud-1-root-login.conf
    content: "PermitRootLogin prohibit-password\n"
    owner: root
    group: root
    mode: '0644'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Grant root SSH access to team members
  ansible.posix.authorized_key:
    user: root
    key: "{{ item }}"
    state: present
  loop: "{{ root_authorized_keys }}"